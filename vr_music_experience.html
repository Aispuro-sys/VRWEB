
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; overflow: hidden; font-family: var(--font-sans); }
  #canvas { display: block; width: 100%; height: 480px; }
  #ui {
    position: absolute; top: 0; left: 0; width: 100%; height: 480px;
    pointer-events: none; display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end; padding-bottom: 24px;
  }
  #player {
    pointer-events: all;
    background: rgba(10,5,30,0.75);
    border: 0.5px solid rgba(180,120,255,0.35);
    border-radius: 20px;
    padding: 16px 24px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    width: 320px;
    backdrop-filter: blur(12px);
  }
  #song-title { font-size: 14px; font-weight: 500; color: #e8d5ff; letter-spacing: 0.04em; }
  #song-artist { font-size: 12px; color: rgba(200,170,255,0.6); }
  #progress-wrap { width: 100%; display: flex; align-items: center; gap: 8px; }
  #progress { flex: 1; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; cursor: pointer; }
  #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #a78bfa, #f472b6); border-radius: 2px; transition: width 0.3s; }
  .time-label { font-size: 11px; color: rgba(200,170,255,0.5); min-width: 28px; }
  #controls { display: flex; align-items: center; gap: 20px; }
  .ctrl-btn {
    background: none; border: none; cursor: pointer;
    color: rgba(200,170,255,0.7); font-size: 20px; line-height: 1;
    transition: color 0.2s, transform 0.1s;
  }
  .ctrl-btn:hover { color: #f0d0ff; transform: scale(1.15); }
  #play-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(160,100,255,0.25);
    border: 1px solid rgba(160,100,255,0.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: #e8d5ff; font-size: 18px;
    transition: background 0.2s, transform 0.1s;
  }
  #play-btn:hover { background: rgba(160,100,255,0.45); transform: scale(1.08); }
  #vol-wrap { display: flex; align-items: center; gap: 6px; width: 100%; }
  #vol-icon { font-size: 13px; color: rgba(200,170,255,0.5); }
  #vol-slider { flex: 1; accent-color: #a78bfa; height: 3px; }
  #msg {
    font-size: 11px; color: rgba(200,170,255,0.5); text-align: center;
    margin-top: 2px; letter-spacing: 0.03em;
  }
  #song-url-input {
    width: 100%; background: rgba(255,255,255,0.07); border: 0.5px solid rgba(180,120,255,0.3);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; color: #e8d5ff;
    outline: none; margin-top: 2px;
  }
  #song-url-input::placeholder { color: rgba(200,170,255,0.35); }
  #add-song-btn {
    background: rgba(160,100,255,0.2); border: 0.5px solid rgba(160,100,255,0.4);
    color: #e8d5ff; border-radius: 8px; padding: 5px 14px; font-size: 12px;
    cursor: pointer; transition: background 0.2s;
  }
  #add-song-btn:hover { background: rgba(160,100,255,0.4); }
  #top-label {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    font-size: 12px; color: rgba(200,170,255,0.45); letter-spacing: 0.08em;
    pointer-events: none; text-align: center;
  }
</style>

<div style="position:relative; width:100%; height:480px; background:#000; border-radius:16px; overflow:hidden;">
  <canvas id="canvas"></canvas>
  <div id="top-label">🖱 Arrastra para girar · Scroll para zoom</div>
  <div id="ui">
    <div id="player">
      <div style="text-align:center;">
        <div id="song-title">Pon una canción 🎵</div>
        <div id="song-artist" style="margin-top:2px;">Tu pareja</div>
      </div>
      <audio id="audio" crossorigin="anonymous"></audio>
      <div id="progress-wrap">
        <span class="time-label" id="cur-time">0:00</span>
        <div id="progress" onclick="seekAudio(event)"><div id="progress-fill"></div></div>
        <span class="time-label" id="dur-time">0:00</span>
      </div>
      <div id="controls">
        <button class="ctrl-btn" id="prev-btn" title="Anterior">⏮</button>
        <div id="play-btn" onclick="togglePlay()">▶</div>
        <button class="ctrl-btn" id="next-btn" title="Siguiente">⏭</button>
      </div>
      <div id="vol-wrap">
        <span id="vol-icon">🔊</span>
        <input type="range" id="vol-slider" min="0" max="1" step="0.01" value="0.7" oninput="setVol(this.value)">
      </div>
      <div style="width:100%; display:flex; gap:6px; margin-top:4px;">
        <input id="song-url-input" placeholder="Pega URL de audio (.mp3, .ogg, .wav)…">
        <button id="add-song-btn" onclick="loadUrl()">▶ Cargar</button>
      </div>
      <div id="msg">Carga una canción o usa un archivo local</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(canvas.parentElement.offsetWidth, 480);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, canvas.parentElement.offsetWidth / 480, 0.1, 1000);
camera.position.set(0, 0, 22);

// Stars
const starGeo = new THREE.BufferGeometry();
const starCount = 1800;
const starPos = new Float32Array(starCount * 3);
const starSizes = new Float32Array(starCount);
for (let i = 0; i < starCount; i++) {
  starPos[i*3]   = (Math.random()-0.5)*200;
  starPos[i*3+1] = (Math.random()-0.5)*200;
  starPos[i*3+2] = (Math.random()-0.5)*200;
  starSizes[i] = Math.random() * 2 + 0.5;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
starGeo.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));
const starMat = new THREE.PointsMaterial({ color: 0xddc4ff, size: 0.3, transparent: true, opacity: 0.85 });
scene.add(new THREE.Points(starGeo, starMat));

// Floating sphere (vinyl record look)
const sphereGeo = new THREE.TorusGeometry(3.5, 0.9, 32, 100);
const sphereMat = new THREE.MeshPhongMaterial({ color: 0x6020a0, shininess: 120, specular: 0xaa88ff, transparent: true, opacity: 0.9 });
const torus = new THREE.Mesh(sphereGeo, sphereMat);
scene.add(torus);

// Inner sphere
const innerGeo = new THREE.SphereGeometry(2.2, 64, 64);
const innerMat = new THREE.MeshPhongMaterial({ color: 0x1a0040, shininess: 200, specular: 0xcc99ff });
const innerSphere = new THREE.Mesh(innerGeo, innerMat);
scene.add(innerSphere);

// Center glow ring
const glowGeo = new THREE.TorusGeometry(2.25, 0.08, 16, 80);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xf472b6, transparent: true, opacity: 0.85 });
const glowRing = new THREE.Mesh(glowGeo, glowMat);
scene.add(glowRing);

// Audio bars
const barCount = 48;
const bars = [];
const barGroup = new THREE.Group();
for (let i = 0; i < barCount; i++) {
  const angle = (i / barCount) * Math.PI * 2;
  const barGeo = new THREE.BoxGeometry(0.15, 0.5, 0.15);
  const barMat = new THREE.MeshPhongMaterial({
    color: new THREE.Color().setHSL(0.75 + (i/barCount)*0.2, 0.9, 0.65),
    transparent: true, opacity: 0.9
  });
  const bar = new THREE.Mesh(barGeo, barMat);
  bar.position.set(Math.cos(angle)*5, Math.sin(angle)*5, 0);
  bar.rotation.z = angle;
  barGroup.add(bar);
  bars.push(bar);
}
scene.add(barGroup);

// Particles
const partCount = 300;
const partGeo = new THREE.BufferGeometry();
const partPos = new Float32Array(partCount * 3);
const partVel = [];
for (let i = 0; i < partCount; i++) {
  const r = 6 + Math.random() * 12;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.random() * Math.PI;
  partPos[i*3] = r * Math.sin(phi) * Math.cos(theta);
  partPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  partPos[i*3+2] = r * Math.cos(phi);
  partVel.push({ speed: 0.005 + Math.random()*0.01, angle: Math.random()*Math.PI*2, r });
}
partGeo.setAttribute('position', new THREE.BufferAttribute(partPos, 3));
const partMat = new THREE.PointsMaterial({ color: 0xf472b6, size: 0.18, transparent: true, opacity: 0.7 });
const particles = new THREE.Points(partGeo, partMat);
scene.add(particles);

// Lights
const ambLight = new THREE.AmbientLight(0x330055, 1.2);
scene.add(ambLight);
const pointLight1 = new THREE.PointLight(0xaa44ff, 2.5, 60);
pointLight1.position.set(10, 10, 10);
scene.add(pointLight1);
const pointLight2 = new THREE.PointLight(0xff44aa, 1.8, 60);
pointLight2.position.set(-10, -8, 8);
scene.add(pointLight2);

// Orbit controls (manual)
let isDragging = false, lastX=0, lastY=0, rotX=0, rotY=0, zoom=22;
canvas.addEventListener('mousedown', e => { isDragging=true; lastX=e.clientX; lastY=e.clientY; });
window.addEventListener('mouseup', () => isDragging=false);
window.addEventListener('mousemove', e => {
  if(!isDragging) return;
  rotY += (e.clientX-lastX)*0.007;
  rotX += (e.clientY-lastY)*0.007;
  lastX=e.clientX; lastY=e.clientY;
});
canvas.addEventListener('wheel', e => { zoom = Math.max(8, Math.min(40, zoom+e.deltaY*0.03)); e.preventDefault(); }, {passive:false});

// Touch support
let lastTouchX=0, lastTouchY=0;
canvas.addEventListener('touchstart', e => { lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY; });
canvas.addEventListener('touchmove', e => {
  rotY += (e.touches[0].clientX-lastTouchX)*0.008;
  rotX += (e.touches[0].clientY-lastTouchY)*0.008;
  lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
  e.preventDefault();
}, {passive:false});

// Audio
const audio = document.getElementById('audio');
let analyser, dataArray, audioCtx, source, isConnected = false;

function initAudio() {
  if(isConnected) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 128;
  dataArray = new Uint8Array(analyser.frequencyBinCount);
  source = audioCtx.createMediaElementSource(audio);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  isConnected = true;
}

let playing = false;
function togglePlay() {
  if(!audio.src) { document.getElementById('msg').textContent = '⚠ Carga una canción primero'; return; }
  initAudio();
  if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if(playing) { audio.pause(); document.getElementById('play-btn').innerHTML='▶'; }
  else { audio.play(); document.getElementById('play-btn').innerHTML='⏸'; }
  playing = !playing;
}

function setVol(v) { audio.volume = v; }
function loadUrl() {
  const url = document.getElementById('song-url-input').value.trim();
  if(!url) return;
  audio.src = url;
  const name = url.split('/').pop().split('?')[0].replace(/\.[^.]+$/,'') || 'Canción';
  document.getElementById('song-title').textContent = decodeURIComponent(name);
  document.getElementById('msg').textContent = '✓ Cargado — presiona ▶';
  playing = false; document.getElementById('play-btn').innerHTML='▶';
}

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('cur-time').textContent = fmt(audio.currentTime);
  document.getElementById('dur-time').textContent = fmt(audio.duration||0);
});
audio.addEventListener('ended', () => { playing=false; document.getElementById('play-btn').innerHTML='▶'; });

function fmt(s) {
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return m+':'+(sec<10?'0':'')+sec;
}
function seekAudio(e) {
  if(!audio.duration) return;
  const rect = document.getElementById('progress').getBoundingClientRect();
  audio.currentTime = ((e.clientX-rect.left)/rect.width)*audio.duration;
}

// Animate
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.012;

  // Camera orbit
  const cx = zoom * Math.sin(rotY) * Math.cos(rotX);
  const cy = zoom * Math.sin(rotX);
  const cz = zoom * Math.cos(rotY) * Math.cos(rotX);
  camera.position.set(cx, cy, cz);
  camera.lookAt(0,0,0);

  // Analyser
  let bass = 0;
  if(analyser && playing) {
    analyser.getByteFrequencyData(dataArray);
    bass = dataArray[2]/255;
    for(let i=0;i<bars.length;i++) {
      const val = (dataArray[Math.floor(i*dataArray.length/bars.length)]||0)/255;
      bars[i].scale.y = 1 + val*8;
      bars[i].position.setLength(5 + val*2);
    }
  } else {
    // Idle animation
    for(let i=0;i<bars.length;i++) {
      const wave = 0.5+0.5*Math.sin(t*1.5+i*0.3);
      bars[i].scale.y = 0.4+wave*1.2;
      bars[i].position.setLength(5+wave*0.3);
    }
    bass = 0.3+0.2*Math.sin(t*0.8);
  }

  torus.rotation.x = t*0.18;
  torus.rotation.z = t*0.11;
  innerSphere.rotation.y = t*0.22;
  barGroup.rotation.z = t*0.07;
  glowRing.rotation.x = t*0.3;
  glowRing.material.opacity = 0.5+0.5*bass;
  glowRing.scale.setScalar(1+bass*0.25);

  // Particles drift
  const pArr = partGeo.attributes.position.array;
  for(let i=0;i<partCount;i++) {
    partVel[i].angle += partVel[i].speed;
    const r = partVel[i].r + Math.sin(t+i)*0.4;
    const theta = partVel[i].angle;
    pArr[i*3]   = r * Math.cos(theta);
    pArr[i*3+1] = r * Math.sin(theta) * 0.5 + Math.sin(t*0.5+i)*2;
    pArr[i*3+2] = r * Math.sin(theta) * 0.5;
  }
  partGeo.attributes.position.needsUpdate = true;

  pointLight1.intensity = 2+bass*3;
  pointLight2.intensity = 1.5+bass*2;
  pointLight1.position.set(10*Math.cos(t*0.3), 10*Math.sin(t*0.2), 10);
  pointLight2.position.set(-10*Math.cos(t*0.2), -8*Math.sin(t*0.3), 8);

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  const w = canvas.parentElement.offsetWidth;
  renderer.setSize(w, 480);
  camera.aspect = w/480;
  camera.updateProjectionMatrix();
});
</script>
